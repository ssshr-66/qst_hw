server:
  port: 8080

spring:
  application:
    name: wedding-studio
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/wedding_studio?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      # 逻辑删除（本项目暂未启用，预留）
  type-aliases-package: com.qst.wedding.entity

logging:
  level:
    com.qst.wedding.mapper: debug
